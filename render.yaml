services:
  - type: web
    name: joys-kitchen
    runtime: node
    buildCommand: npm install && npm run build
    # "npm run start" now resolves to: npx serve dist -s -l ${PORT:-3000}
    startCommand: npm run start
    envVars:
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
      # Vendor email used to gate the vendor login page
      - key: VITE_VENDOR_EMAIL
        sync: false
      # Optional legacy PIN (kept for backward compat — prefer email auth)
      - key: VITE_VENDOR_PIN
        sync: false
